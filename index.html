<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>NY BHAI PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

<style>
:root{
  --neon:#00ff41;
  --danger:#ff003c;
  --gold:#ffea00;
  --cyan:#00eeff;
  --purple:#bf00ff;
  --orange:#ff6600;
  --bg:#050505;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:var(--bg);color:#fff;
  font-family:'Rajdhani',sans-serif;
  user-select:none;overflow-x:hidden;
  padding-bottom:90px;min-height:100vh;
}

/* ===== ANIMATED BG ===== */
.bg-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;overflow:hidden}
.bg-canvas::before{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(ellipse 80% 60% at 15% 15%,rgba(0,255,65,.09) 0%,transparent 55%),
    radial-gradient(ellipse 60% 80% at 85% 80%,rgba(191,0,255,.11) 0%,transparent 55%),
    radial-gradient(ellipse 50% 50% at 50% 45%,rgba(0,238,255,.06) 0%,transparent 65%);
  animation:bgPulse 6s ease-in-out infinite alternate;
}
@keyframes bgPulse{0%{opacity:.6;transform:scale(1)}100%{opacity:1;transform:scale(1.06)}}

.orb{position:absolute;border-radius:50%;filter:blur(55px);animation:orbF linear infinite}
.orb1{width:220px;height:220px;background:rgba(0,255,65,.11);top:-60px;left:-60px;animation-duration:15s}
.orb2{width:160px;height:160px;background:rgba(255,0,60,.11);top:28%;right:-40px;animation-duration:11s;animation-delay:-4s}
.orb3{width:190px;height:190px;background:rgba(0,238,255,.09);bottom:22%;left:8%;animation-duration:18s;animation-delay:-8s}
.orb4{width:130px;height:130px;background:rgba(191,0,255,.11);bottom:12%;right:12%;animation-duration:13s;animation-delay:-6s}
.orb5{width:110px;height:110px;background:rgba(255,102,0,.09);top:58%;left:42%;animation-duration:10s;animation-delay:-2s}
@keyframes orbF{
  0%{transform:translate(0,0) scale(1)}
  33%{transform:translate(25px,-35px) scale(1.08)}
  66%{transform:translate(-18px,28px) scale(.92)}
  100%{transform:translate(0,0) scale(1)}
}

.grid-lines{
  position:absolute;inset:0;
  background-image:linear-gradient(rgba(0,255,65,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,65,.025) 1px,transparent 1px);
  background-size:40px 40px;
}

/* ===== CONTENT LAYER ===== */
.content{position:relative;z-index:1}

/* ===== HEADER ===== */
.header{text-align:center;padding:26px 16px 14px;position:relative}
.header::after{
  content:'';position:absolute;bottom:0;left:8%;width:84%;height:1px;
  background:linear-gradient(90deg,transparent,var(--neon),var(--cyan),var(--purple),transparent);
  animation:lineGlow 3s linear infinite;
}
@keyframes lineGlow{0%,100%{opacity:.3}50%{opacity:1}}

.logo-text{
  font-family:'Orbitron',monospace;
  font-size:34px;font-weight:900;letter-spacing:5px;
  background:linear-gradient(135deg,var(--neon),var(--cyan),var(--purple),var(--gold),var(--neon));
  background-size:300% 300%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:gradShift 3s ease-in-out infinite,glitch 2.5s infinite;
  filter:drop-shadow(0 0 14px rgba(0,255,65,.45));
}
@keyframes gradShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes glitch{
  0%,93%,100%{transform:skew(0)}
  94%{transform:skew(-4deg) translateX(2px)}
  95%{transform:skew(3deg) translateX(-2px)}
  96%{transform:skew(-1deg)}
}

.tagline{
  font-family:'Orbitron',monospace;
  color:var(--gold);font-size:10px;letter-spacing:5px;margin-top:5px;
  animation:tagPulse 2s ease-in-out infinite;
}
@keyframes tagPulse{0%,100%{opacity:.6}50%{opacity:1}}

/* ===== TELEGRAM BUTTON ===== */
.tg-wrap{display:flex;justify-content:center;padding:14px 16px 6px}
.tg-btn{
  display:inline-flex;align-items:center;gap:10px;
  padding:13px 30px;border-radius:50px;
  font-family:'Orbitron',monospace;
  font-size:12px;font-weight:700;letter-spacing:2px;
  color:#fff;text-decoration:none;
  position:relative;overflow:hidden;
  background:linear-gradient(135deg,#0088cc,#005f9f,#0099dd);
  box-shadow:0 0 24px rgba(0,136,204,.5),0 0 50px rgba(0,136,204,.15);
  animation:tgPulse 2.5s ease-in-out infinite;
  transition:transform .2s;
}
.tg-btn:active{transform:scale(.95)}
.tg-btn::before{
  content:'';position:absolute;top:-50%;left:-60%;
  width:45%;height:200%;
  background:rgba(255,255,255,.18);
  transform:skewX(-20deg);
  animation:shine 3.5s ease-in-out infinite;
}
@keyframes shine{0%{left:-60%}50%{left:120%}100%{left:120%}}
@keyframes tgPulse{
  0%,100%{box-shadow:0 0 24px rgba(0,136,204,.5),0 0 50px rgba(0,136,204,.15)}
  50%{box-shadow:0 0 40px rgba(0,136,204,.85),0 0 80px rgba(0,136,204,.35)}
}
.tg-icon{
  width:28px;height:28px;border-radius:50%;
  background:rgba(255,255,255,.2);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;flex-shrink:0;
}

/* ===== GLASS BOX ===== */
.glass-box{
  max-width:420px;margin:8px 12px;
  background:rgba(255,255,255,.025);
  border:1px solid rgba(0,255,65,.15);
  border-radius:24px;padding:22px 18px;
  backdrop-filter:blur(20px);text-align:center;
  box-shadow:0 0 0 1px rgba(0,255,65,.04),0 10px 40px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.05);
}
@media(min-width:444px){.glass-box,.history-box{margin-left:auto;margin-right:auto}}

.period-id{
  font-family:'Orbitron',monospace;
  color:#666;font-size:11px;letter-spacing:3px;margin-bottom:14px;
}

/* ===== PREDICTION RING ===== */
.pred-display{
  position:relative;display:inline-flex;
  align-items:center;justify-content:center;
  width:140px;height:140px;margin:0 auto 14px;
}
.pred-ring{
  position:absolute;inset:0;border-radius:50%;
  border:3px solid transparent;
  background:linear-gradient(var(--bg),var(--bg)) padding-box,
    conic-gradient(var(--neon),var(--cyan),var(--purple),var(--gold),var(--orange),var(--neon)) border-box;
  animation:ringSpinW 4s linear infinite;
}
.pred-ring2{
  position:absolute;inset:8px;border-radius:50%;
  border:1px solid transparent;
  background:linear-gradient(var(--bg),var(--bg)) padding-box,
    conic-gradient(var(--purple),var(--neon),var(--gold)) border-box;
  animation:ringSpinW 6s linear infinite reverse;
}
@keyframes ringSpinW{to{transform:rotate(360deg)}}

.pred-val{
  font-family:'Orbitron',monospace;
  font-size:26px;font-weight:900;
  position:relative;z-index:1;
  transition:all .4s;
  filter:drop-shadow(0 0 12px rgba(0,255,65,.8));
}

.opps-box{
  font-family:'Orbitron',monospace;
  color:var(--gold);font-size:12px;
  border:1px dashed rgba(255,234,0,.35);
  border-radius:12px;padding:10px 14px;margin-bottom:4px;
  background:rgba(255,234,0,.03);
  animation:oppPulse 2s ease-in-out infinite;
  letter-spacing:1px;
}
@keyframes oppPulse{0%,100%{border-color:rgba(255,234,0,.25)}50%{border-color:rgba(255,234,0,.75)}}

/* ===== SCAN BAR ===== */
.scan-bar{
  height:2px;max-width:380px;margin:10px auto;
  background:linear-gradient(90deg,transparent,var(--neon),var(--cyan),var(--purple),transparent);
  border-radius:2px;animation:scanPulse 2s ease-in-out infinite;
}
@keyframes scanPulse{0%,100%{opacity:.3;transform:scaleX(.2)}50%{opacity:1;transform:scaleX(1)}}

/* ===== PAGES ===== */
.page{display:none}
.page.active{display:block}
.page-ttl{
  font-family:'Orbitron',monospace;font-size:10px;
  letter-spacing:5px;color:#333;text-align:center;padding:12px 0 2px;
}

/* ===== HISTORY ===== */
.history-box{
  max-width:420px;margin:8px 12px;
  background:rgba(255,255,255,.025);
  border:1px solid rgba(0,238,255,.12);
  border-radius:24px;padding:20px 16px;
  backdrop-filter:blur(20px);
}

.hist-title{
  font-family:'Orbitron',monospace;font-size:13px;
  letter-spacing:3px;color:var(--cyan);
  text-align:center;margin-bottom:16px;
}

/* Stats */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.stat-card{
  background:rgba(255,255,255,.04);border-radius:14px;
  padding:10px 4px;text-align:center;
  border:1px solid rgba(255,255,255,.06);
}
.stat-num{font-family:'Orbitron',monospace;font-size:22px;font-weight:900;display:block;line-height:1}
.stat-lbl{font-size:8px;letter-spacing:1.5px;color:#555;margin-top:4px;display:block;font-family:'Orbitron',monospace}
.c-win{color:var(--neon)} .c-loss{color:var(--danger)}
.c-jack{
  background:linear-gradient(135deg,var(--gold),var(--orange));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.c-total{color:var(--cyan)}

table{width:100%;border-collapse:collapse}
th{font-family:'Orbitron',monospace;color:#444;border-bottom:1px solid #1a1a1a;padding:8px 4px;font-size:9px;letter-spacing:2px}
td{padding:9px 4px;border-bottom:1px solid rgba(255,255,255,.03);text-align:center;font-weight:600;font-size:12px}
.win{color:var(--neon);font-weight:700}
.loss{color:var(--danger);font-weight:700}
.jackpot{
  font-family:'Orbitron',monospace;font-size:9px;font-weight:900;
  background:linear-gradient(135deg,var(--gold),var(--orange));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:jackFlash .7s ease-in-out infinite;
}
@keyframes jackFlash{0%,100%{filter:drop-shadow(0 0 3px rgba(255,234,0,.4))}50%{filter:drop-shadow(0 0 10px rgba(255,234,0,1))}}

.empty-state{text-align:center;padding:28px;color:#2a2a2a;font-family:'Orbitron',monospace;font-size:10px;letter-spacing:2px}

/* ===== JACKPOT TOAST ===== */
.jack-toast{
  position:fixed;top:50%;left:50%;
  transform:translate(-50%,-50%) scale(0);
  background:linear-gradient(135deg,#0f0800,#1e1000);
  border:2px solid var(--gold);border-radius:22px;
  padding:28px 40px;text-align:center;z-index:999;
  transition:transform .3s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 0 70px rgba(255,234,0,.4),0 0 120px rgba(255,102,0,.15);
  min-width:260px;
}
.jack-toast.show{transform:translate(-50%,-50%) scale(1)}
.jack-em{font-size:50px;display:block;margin-bottom:10px;animation:jackBounce .5s ease-in-out infinite alternate}
@keyframes jackBounce{from{transform:translateY(0)}to{transform:translateY(-12px)}}
.jack-h{
  font-family:'Orbitron',monospace;font-size:20px;font-weight:900;letter-spacing:3px;
  background:linear-gradient(135deg,var(--gold),var(--orange),var(--gold));
  background-size:200%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:gradShift 1.5s linear infinite;
}
.jack-s{color:#666;font-size:12px;margin-top:8px;font-family:'Rajdhani',sans-serif}

/* ===== BOTTOM NAV ===== */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;height:78px;
  background:rgba(5,5,5,.9);backdrop-filter:blur(24px);
  border-top:1px solid rgba(255,255,255,.06);
  display:grid;grid-template-columns:1fr 1fr;z-index:100;
  box-shadow:0 -10px 40px rgba(0,0,0,.6);
}

.nav-btn{
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;
  background:transparent;border:none;cursor:pointer;
  font-family:'Orbitron',monospace;font-size:9px;letter-spacing:2px;
  color:#333;transition:all .3s;position:relative;overflow:hidden;
}
.nav-btn::after{
  content:'';position:absolute;bottom:0;left:12%;width:76%;height:2px;
  background:transparent;border-radius:2px;transition:background .3s;
}
.nav-btn.active{color:#ddd}
#nav-pred.active::after{background:linear-gradient(90deg,var(--neon),var(--cyan))}
#nav-hist.active::after{background:linear-gradient(90deg,var(--purple),var(--cyan))}

.nav-icon{
  width:38px;height:38px;border-radius:13px;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.07);transition:all .3s;
}
#nav-pred.active .nav-icon{
  background:linear-gradient(135deg,rgba(0,255,65,.12),rgba(0,238,255,.08));
  border-color:rgba(0,255,65,.25);box-shadow:0 0 18px rgba(0,255,65,.18);
}
#nav-hist.active .nav-icon{
  background:linear-gradient(135deg,rgba(191,0,255,.12),rgba(0,238,255,.08));
  border-color:rgba(191,0,255,.25);box-shadow:0 0 18px rgba(191,0,255,.18);
}
</style>
</head>

<body oncontextmenu="return false;">

<!-- BG -->
<div class="bg-canvas">
  <div class="grid-lines"></div>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
  <div class="orb orb4"></div>
  <div class="orb orb5"></div>
</div>

<div class="content">

  <!-- HEADER -->
  <div class="header">
    <div class="logo-text">NY BHAI PRO</div>
    <div class="tagline">⚡ PRO LOGIC HACK ⚡</div>
  </div>

  <!-- TELEGRAM -->
  <div class="tg-wrap">
    <a class="tg-btn" href="https://t.me/+pQmC3kmqwt5jZjk9" target="_blank">
      <span class="tg-icon">💠</span>
      JOIN VIP CHANNEL
    </a>
  </div>

  <!-- PREDICTION PAGE -->
  <div id="page-pred" class="page active">
    <div class="page-ttl">LIVE PREDICTION</div>
    <div class="scan-bar"></div>
    <div class="glass-box">
      <div class="period-id" id="pID">PERIOD: ---</div>
      <div class="pred-display">
        <div class="pred-ring"></div>
        <div class="pred-ring2"></div>
        <div class="pred-val" id="pRes">WAIT</div>
      </div>
      <div class="opps-box" id="pOpps">🔍 ANALYZING...</div>
    </div>
  </div>

  <!-- HISTORY PAGE -->
  <div id="page-hist" class="page">
    <div class="history-box">
      <div class="hist-title">📊 PREDICTION HISTORY</div>
      <div class="stats-row">
        <div class="stat-card">
          <span class="stat-num c-win" id="s-win">0</span>
          <span class="stat-lbl">WIN</span>
        </div>
        <div class="stat-card">
          <span class="stat-num c-loss" id="s-loss">0</span>
          <span class="stat-lbl">LOSS</span>
        </div>
        <div class="stat-card">
          <span class="stat-num c-jack" id="s-jack">0</span>
          <span class="stat-lbl">JACKPOT</span>
        </div>
        <div class="stat-card">
          <span class="stat-num c-total" id="s-total">0</span>
          <span class="stat-lbl">TOTAL</span>
        </div>
      </div>
      <table>
        <thead><tr><th>PRD</th><th>PRED</th><th>NUM</th><th>RESULT</th></tr></thead>
        <tbody id="logs"><tr><td colspan="4" class="empty-state">WAITING FOR DATA...</td></tr></tbody>
      </table>
    </div>
  </div>

</div>

<!-- JACKPOT TOAST -->
<div class="jack-toast" id="jackToast">
  <span class="jack-em">🏆</span>
  <div class="jack-h">JACKPOT!</div>
  <div class="jack-s" id="jackNum">Number matched perfectly!</div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="nav-btn active" id="nav-pred" onclick="switchPage('pred')">
    <div class="nav-icon">🎯</div>
    PREDICTION
  </button>
  <button class="nav-btn" id="nav-hist" onclick="switchPage('hist')">
    <div class="nav-icon">📈</div>
    HISTORY
  </button>
</div>

<script>
const B_POOL=[5,6,7,8,9], S_POOL=[0,1,2,3,4];
let currentOpposites=[];
let stats={win:0,loss:0,jack:0,total:0};
let logRows=[];

function switchPage(p){
  ['pred','hist'].forEach(x=>{
    document.getElementById('page-'+x).classList.remove('active');
    document.getElementById('nav-'+x).classList.remove('active');
  });
  document.getElementById('page-'+p).classList.add('active');
  document.getElementById('nav-'+p).classList.add('active');
}

function showJackpot(num){
  const t=document.getElementById('jackToast');
  document.getElementById('jackNum').textContent='Number '+num+' matched exactly! 🎰';
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3200);
}

function updateStats(){
  document.getElementById('s-win').textContent=stats.win;
  document.getElementById('s-loss').textContent=stats.loss;
  document.getElementById('s-jack').textContent=stats.jack;
  document.getElementById('s-total').textContent=stats.total;
}

window.onload=()=>runLogic();

async function runLogic(){
  setInterval(async()=>{
    try{
      const res=await fetch("https://draw.ar-lottery01.com/WinGo/WinGo_1M/GetHistoryIssuePage.json");
      const json=await res.json();
      const latest=json.data.list[0];
      const last5=json.data.list.slice(0,5).map(x=>parseInt(x.number)>=5?"BIG":"SMALL");
      const nextPred=last5.filter(x=>x==="BIG").length>2?"BIG":"SMALL";

      if(window.lastId!==latest.issueNumber){
        const num=parseInt(latest.number);
        const size=num>=5?"BIG":"SMALL";
        let lastPred=window.savedPrediction||nextPred;
        let lastOpps=window.savedOpps||[];

        if(window.lastId){
          const predCorrect=(lastPred===size);
          const oppMatch=lastOpps.includes(num);
          const jackpot=predCorrect&&oppMatch;
          const win=predCorrect||oppMatch;

          stats.total++;
          if(jackpot){stats.jack++;stats.win++;showJackpot(num);}
          else if(win){stats.win++;}
          else{stats.loss++;}
          updateStats();

          const statusHtml=jackpot
            ?'<span class="jackpot">🏆 JACKPOT</span>'
            :win
              ?'<span class="win">✅ WIN</span>'
              :'<span class="loss">❌ LOSS</span>';

          const numColor=num>=5?'#00ff41':'#ff003c';

          logRows.unshift(`<tr>
            <td style="font-family:'Orbitron',monospace;font-size:10px;color:#555">${latest.issueNumber.slice(-4)}</td>
            <td style="font-family:'Orbitron',monospace;font-size:10px;color:${lastPred==='BIG'?'#00ff41':'#ff003c'}">${lastPred}</td>
            <td style="font-family:'Orbitron',monospace;font-size:18px;font-weight:900;color:${numColor}">${num}</td>
            <td>${statusHtml}</td>
          </tr>`);
          if(logRows.length>30)logRows.pop();
          document.getElementById("logs").innerHTML=logRows.join('');
        }

        window.lastId=latest.issueNumber;
        window.savedPrediction=nextPred;
        const pool=nextPred==="BIG"?S_POOL:B_POOL;
        currentOpposites=pool.sort(()=>0.5-Math.random()).slice(0,2);
        window.savedOpps=currentOpposites;
      }

      document.getElementById("pID").innerText="PERIOD: "+(BigInt(latest.issueNumber)+1n);

      const pEl=document.getElementById("pRes");
      if(nextPred==="BIG"){
        pEl.innerText="BIG";
        pEl.style.background="linear-gradient(135deg,#00ff41,#00eeff)";
      } else {
        pEl.innerText="SMALL";
        pEl.style.background="linear-gradient(135deg,#ff003c,#ff6600)";
      }
      pEl.style.webkitBackgroundClip="text";
      pEl.style.backgroundClip="text";
      pEl.style.webkitTextFillColor="transparent";

      document.getElementById("pOpps").innerText="🎯 SAFE NOs:  "+currentOpposites.join("   |   ");
    }catch(e){}
  },3000);
}
</script>
</body>
</html>
